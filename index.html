<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>충무새힘한의원 | 의료진 소개</title>
    <style>
        :root {
            --primary-color: #1a5f7a;
            --accent-color: #c8a2c8;
            --text-color: #333;
            --bg-color: #f9f9f9;
        }
        body { 
            font-family: 'Pretendard', sans-serif; 
            line-height: 1.6; 
            color: var(--text-color); 
            margin: 0; 
            padding-top: 80px; 
        }
        header { 
            background: #fff; 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid #eee; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            box-sizing: border-box; 
            z-index: 1000; 
        }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); }
        nav a { margin-left: 20px; text-decoration: none; color: #555; font-weight: 500; }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 80px 20px; }
        .profile-section { 
            display: grid; 
            grid-template-columns: 1fr 2fr; 
            gap: 60px; 
            align-items: center; 
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .profile-image-container { text-align: center; }
        .profile-image { 
            width: 100%; 
            max-width: 300px;
            border-radius: 50%; 
            object-fit: cover; 
            aspect-ratio: 1/1; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .photo-note { font-size: 0.8rem; color: #888; margin-top: 15px; }
        
        .profile-info h1 { color: var(--primary-color); margin-bottom: 5px; font-size: 2rem; }
        .profile-info .title { font-size: 1.2rem; color: #666; margin-bottom: 25px; font-weight: bold; }
        .profile-info ul { list-style: none; padding: 0; margin-bottom: 40px; }
        .profile-info li { 
            margin-bottom: 12px; 
            position: relative; 
            padding-left: 25px; 
            font-size: 1.05rem;
        }
        .profile-info li::before { 
            content: '✓'; 
            position: absolute; 
            left: 0; 
            color: var(--primary-color); 
            font-weight: bold; 
        }
        
        .clinical-focus { 
            background: var(--bg-color); 
            padding: 25px; 
            border-radius: 10px; 
            border-left: 4px solid var(--primary-color);
        }
        .clinical-focus h3 { color: var(--primary-color); margin-top: 0; margin-bottom: 10px; }
        .clinical-focus p { margin: 0; font-size: 1.1rem; font-weight: 500; }

        footer { 
            background: #333; 
            color: #fff; 
            padding: 30px 5%; 
            text-align: center; 
            font-size: 0.9rem; 
            margin-top: 100px; 
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">충무새힘한의원</div>
        <nav>
            <a href="index.html">홈</a>
            <a href="#about" style="color: var(--primary-color); font-weight: bold;">의료진 소개</a>
            <a href="treatment.html">특화 진료</a>
            <a href="location.html">오시는 길</a>
        </nav>
    </header>

    <div class="container">
        <section id="about" class="profile-section">
            <div class="profile-image-container">
                <img src="doctor_photo_temp.jpg" alt="태원정 원장님" class="profile-image">
                <p class="photo-note">* 임시 사진 (추후 공식 프로필 사진 교체 예정)</p>
            </div>
            <div class="profile-info">
                <h1>태원정</h1>
                <p class="title">진료원장</p>
                <ul>
                    <li>대전대학교 한의학과 졸</li>
                    <li>척추신경추나의학회 회원</li>
                    <li>북미 RMSKS sonographer</li>
                    <li>대한 스포츠 한의학회 회원</li>
                    <li>임상의학침학회 회원</li>
                </ul>
                <div class="clinical-focus">
                    <h3>핵심 진료 분야</h3>
                    <p>만성 퇴행성 질환, 급성기 파열, 비수술 강화</p>
                </div>
            </div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 충무새힘한의원. All rights reserved.</p>
    </footer>
</body>
</html>
