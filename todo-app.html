<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>To-Do List Application</title>\n    <style>\n        body { font-family: Arial, sans-serif; margin: 20px; }\n        input[type="text"] { margin-right: 10px; }\n        ul { list-style-type: none; padding: 0; }\n        li { padding: 8px; margin: 5px 0; border: 1px solid #ccc; }\n        .completed { text-decoration: line-through; color: gray; }\n    </style>\n</head>\n<body>\n    <h1>To-Do List</h1>\n    <input type="text" id="taskInput" placeholder="Add a new task">\n    <button onclick="addTask()">Add Task</button>\n    <h2>Tasks</h2>\n    <ul id="taskList"></ul>\n    <h2>Statistics</h2>\n    <p>Total Tasks: <span id="totalTasks">0</span></p>\n    <p>Completed Tasks: <span id="completedTasks">0</span></p>\n\n    <script>\n        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];\n        const taskList = document.getElementById('taskList');\n        const totalTasksElem = document.getElementById('totalTasks');\n        const completedTasksElem = document.getElementById('completedTasks');\n\n        function renderTasks() {\n            taskList.innerHTML = '';\n            tasks.forEach((task, index) => {\n                const li = document.createElement('li');\n                li.textContent = task.text;\n                if (task.completed) {\n                    li.classList.add('completed');\n                }\n                li.onclick = () => toggleTask(index);\n                taskList.appendChild(li);\n            });\n            updateStatistics();\n        }\n\n        function addTask() {\n            const taskText = document.getElementById('taskInput').value;\n            if (taskText) {\n                tasks.push({ text: taskText, completed: false });\n                document.getElementById('taskInput').value = '';\n                saveTasks();\n                renderTasks();\n            }\n        }\n\n        function toggleTask(index) {\n            tasks[index].completed = !tasks[index].completed;\n            saveTasks();\n            renderTasks();\n        }\n\n        function saveTasks() {\n            localStorage.setItem('tasks', JSON.stringify(tasks));\n        }\n\n        function updateStatistics() {\n            totalTasksElem.textContent = tasks.length;\n            completedTasksElem.textContent = tasks.filter(task => task.completed).length;\n        }\n\n        renderTasks();\n    <\/script>\n</body>\n</html>
